<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-primary font-body overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] border-b border-[#2A2A2A] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#FFFFFF] hover:bg-[#1B1B1B] transition-colors duration-100 p-2 Active: scale-95 transition-transform" data-icon="menu">menu</span>
<span class="font-['Space_Grotesk'] font-black text-2xl text-[#FFFFFF] tracking-[0.2em] uppercase">KINETIC</span>
</div>
<span class="material-symbols-outlined text-[#FFFFFF] hover:bg-[#1B1B1B] transition-colors duration-100 p-2 Active: scale-95 transition-transform" data-icon="settings">settings</span>
</header>
<main class="pt-24 pb-32 px-6 min-h-screen flex flex-col justify-between">
<!-- Exercise Title -->
<section class="w-full">
<h1 class="font-headline font-black text-[15vw] leading-[0.8] tracking-tighter uppercase mb-12">
                SQUAT
            </h1>
</section>
<!-- Metrics Inputs -->
<section class="grid grid-cols-1 gap-8 mb-12">
<!-- Weight Input -->
<div class="group">
<label class="font-label text-sm tracking-widest text-outline mb-2 block uppercase">WEIGHT (KG)</label>
<input class="w-full bg-transparent border-none border-b-4 border-surface-container-highest focus:border-tertiary focus:ring-0 font-headline font-bold text-[12vw] p-0 text-primary transition-colors duration-150" placeholder="000" type="number"/>
</div>
<!-- Reps Input -->
<div class="group">
<label class="font-label text-sm tracking-widest text-outline mb-2 block uppercase">REPS</label>
<input class="w-full bg-transparent border-none border-b-4 border-surface-container-highest focus:border-tertiary focus:ring-0 font-headline font-bold text-[12vw] p-0 text-primary transition-colors duration-150" placeholder="00" type="number"/>
</div>
<!-- Sequence/Set Input -->
<div class="group">
<label class="font-label text-sm tracking-widest text-outline mb-2 block uppercase">SEQUENCE</label>
<input class="w-full bg-transparent border-none border-b-4 border-surface-container-highest focus:border-tertiary focus:ring-0 font-headline font-bold text-[12vw] p-0 text-primary transition-colors duration-150" placeholder="01" type="number"/>
</div>
</section>
<!-- Save Action -->
<section class="w-full mb-16">
<button class="w-full bg-tertiary text-on-tertiary font-headline font-black text-4xl py-10 uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all">
                SAVE SET
            </button>
</section>
<!-- Rest Timer Overlay/Section -->
<section class="w-full flex flex-col items-start border-t border-surface-container-high pt-8">
<label class="font-label text-xs tracking-[0.3em] text-outline uppercase mb-2">REST COUNTDOWN</label>
<div class="font-headline font-light text-[22vw] leading-none tabular-nums tracking-tighter text-tertiary">
                02:00
            </div>
</section>
</main>
