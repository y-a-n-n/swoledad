<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#131313",
                        "inverse-primary": "#006e16",
                        "on-tertiary-fixed": "#ffffff",
                        "outline": "#919191",
                        "on-background": "#e2e2e2",
                        "on-tertiary": "#002203",
                        "surface-container-highest": "#353535",
                        "inverse-on-surface": "#303030",
                        "on-secondary-fixed": "#1a1c1c",
                        "surface-tint": "#00e639",
                        "surface-bright": "#393939",
                        "surface-container": "#1f1f1f",
                        "secondary": "#c6c6c7",
                        "primary-container": "#00f63e",
                        "tertiary-fixed-dim": "#00530e",
                        "on-tertiary-container": "#000000",
                        "surface-dim": "#131313",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#72ff70",
                        "background": "#131313",
                        "outline-variant": "#474747",
                        "tertiary-fixed": "#006e16",
                        "error": "#ffb4ab",
                        "primary-fixed": "#006e16",
                        "on-surface": "#e2e2e2",
                        "on-primary": "#002203",
                        "on-surface-variant": "#c6c6c6",
                        "on-secondary": "#1a1c1c",
                        "inverse-surface": "#e2e2e2",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed-dim": "#00530e",
                        "primary": "#ffffff",
                        "on-secondary-fixed-variant": "#3a3c3c",
                        "tertiary": "#72ff70",
                        "on-primary-fixed": "#ffffff",
                        "secondary-container": "#454747",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#c6c6c7",
                        "on-primary-container": "#000000",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1b1b1b",
                        "on-primary-fixed-variant": "#72ff70",
                        "surface-variant": "#353535",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#aaabab",
                        "on-secondary-container": "#e2e2e2",
                        "tertiary-container": "#00a827"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .brutalist-button {
            border-radius: 0 !important;
        }
        .massive-text {
            line-height: 0.8;
            letter-spacing: -0.05em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background selection:bg-tertiary selection:text-on-tertiary">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#131313] border-b border-[#2A2A2A] flex justify-between items-center px-6 h-16 w-full">
<div class="font-['Space_Grotesk'] font-bold uppercase tracking-tighter text-2xl font-black text-[#FFFFFF] tracking-[0.2em]">KINETIC</div>
<div class="flex gap-4">
<button class="text-[#FFFFFF] hover:bg-[#1B1B1B] transition-colors duration-100 p-2 Active: scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<button class="text-[#FFFFFF] hover:bg-[#1B1B1B] transition-colors duration-100 p-2 Active: scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</nav>
<main class="min-h-screen pt-16 pb-20 flex flex-col">
<!-- Hero Action Section -->
<section class="flex-grow flex items-center justify-center p-6">
<button class="w-full h-full min-h-[353px] bg-[#72FF70] text-[#002203] font-headline font-black text-6xl md:text-9xl brutalist-button massive-text text-left p-8 flex flex-col justify-end Active: scale-95 transition-transform">
<span>START</span>
<span>WORKOUT</span>
</button>
</section>
<!-- Stats Grid -->
<section class="p-6 grid grid-cols-1 md:grid-cols-2 gap-px bg-[#2A2A2A]">
<!-- Metric 1: Weekly Sessions -->
<div class="bg-[#131313] py-12 px-6 flex flex-col items-start justify-center">
<div class="font-label text-xs font-bold text-on-surface-variant tracking-[0.3em] mb-4 uppercase">WEEKLY SESSIONS</div>
<div class="font-headline font-black text-8xl md:text-[10rem] leading-none text-white tracking-tighter">
                    3/4
                </div>
</div>
<!-- Metric 2: Last Sync -->
<div class="bg-[#131313] py-12 px-6 flex flex-col items-start justify-center">
<div class="font-label text-xs font-bold text-on-surface-variant tracking-[0.3em] mb-4 uppercase">LAST SYNC</div>
<div class="font-headline font-black text-8xl md:text-[10rem] leading-none text-white tracking-tighter">
                    2M<span class="text-4xl md:text-6xl align-top ml-2 font-medium">AGO</span>
</div>
</div>
</section>
<!-- Aesthetic Full-Bleed Metric Strip (Brutalist Component) -->
<div class="w-full h-8 bg-tertiary-container mt-auto"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 pb-safe bg-[#131313] border-t border-[#2A2A2A] z-50">
<a class="flex flex-col items-center justify-center text-[#72FF70] py-2 font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-widest hover:opacity-100 transition-opacity duration-100 Active: translate-y-[-2px] transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span>DASHBOARD</span>
</a>
<a class="flex flex-col items-center justify-center text-[#FFFFFF] opacity-50 py-2 font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-widest hover:opacity-100 transition-opacity duration-100 Active: translate-y-[-2px] transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="fitness_center">fitness_center</span>
<span>WORKOUT</span>
</a>
<a class="flex flex-col items-center justify-center text-[#FFFFFF] opacity-50 py-2 font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-widest hover:opacity-100 transition-opacity duration-100 Active: translate-y-[-2px] transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span>ANALYTICS</span>
</a>
</nav>
<!-- Visual Background Element (Subtle Grain) -->
<div class="fixed inset-0 pointer-events-none opacity-5 z-[-1] overflow-hidden">
<div class="w-full h-full bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
</div>
</body></html>
