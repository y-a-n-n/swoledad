            </h2>
</section>
<!-- Metrics Canvas -->
<section class="flex-grow flex flex-col justify-center space-y-16">
<!-- Metric Block: Mass -->
<div class="flex flex-col items-start">
<span class="font-headline text-[15vw] md:text-[10rem] font-black leading-[0.8] tracking-tighter text-primary">

</div>

<div class="flex flex-col items-start">
<span class="font-headline text-[15vw] md:text-[10rem] font-black leading-[0.8] tracking-tighter text-tertiary">
                    842
                </span>
<span class="font-label text-sm md:text-xl font-bold uppercase tracking-[0.4em] text-outline mt-2">CALORIES</span>
</div>
</section>
